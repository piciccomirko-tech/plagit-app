dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_test:
    sdk: flutter

flutter_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/new_app_icon.png"
  adaptive_icon_background: "#3F8E9B"
  adaptive_icon_foreground: "assets/icons/new_app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/positions/
    - assets/payment/
    - assets/map_style/
    - assets/lottie/
    - assets/html/
    - assets/svgs/
    - assets/dialog_flow_auth.json

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-Black.ttf
          weight: 900
    - family: Klavika
      fonts:
        - asset: assets/fonts/Klavika-light.otf
          weight: 400
        - asset: assets/fonts/Klavika-medium.otf
          weight: 500
        - asset: assets/fonts/Klavika-bold.otf
          weight: 600
    - family: SF-Pro
      fonts:
        - asset: assets/fonts/SF-Pro.ttf

