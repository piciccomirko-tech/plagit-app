name: mh
version: 3.2.8+95
publish_to: none
description: A new Flutter project.

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:

  cupertino_icons: ^1.0.8

  html: ^0.15.4

  flip_card: ^0.7.0

  appsflyer_sdk: ^6.14.3

  # better error handle helper
  dartz: ^0.10.1

  # state management, routing
  get: ^4.6.6

  flutter_widget_from_html: ^0.15.0

  chewie: ^1.8.1

  video_player: ^2.8.6

  # local storage
  get_storage: ^2.1.1

  # save image in local
  cached_network_image: ^3.3.1

  # image picker form local
  image_picker: ^1.1.2

  image_cropper: ^5.0.1

  flutter_image_compress: ^2.3.0

  file_picker: ^8.0.3

  # for image picker
  permission_handler: ^11.3.1

  # for network (specially for upload file)
  dio: ^5.4.3+1

  http_parser: ^4.0.2

  share_plus: ^9.0.0

  pin_code_fields: ^8.0.1

  # dotted border for beautiful ui
  dotted_border: ^2.1.0

  # handle multiple device ratio
  flutter_screenutil: ^5.9.3

  # check token expire or not
  jwt_decoder: ^2.0.1

  socket_io_client: ^2.0.3+1

  dropdown_button2: ^2.3.9

  webview_flutter: ^4.8.0

  expandable_page_view: ^1.0.17

  states_rebuilder: ^6.4.0

  #Don't update this package for the time being
  intl_phone_field: ^3.2.0

  url_launcher: ^6.2.6

  lottie: ^3.1.2

  another_xlider: ^3.0.2

  flutter_polyline_points: ^2.0.0

  badges: ^3.1.2

  intl: 0.20.2

  horizontal_data_table: ^4.3.1

  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.1.2
  device_info_plus: ^10.1.0
  http: ^1.2.1
  flutter_staggered_animations: ^1.1.1
  flutter_spinkit: ^5.2.1
  custom_radio_grouped_button: ^2.2.1
  pdf: ^3.10.8
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.3
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0

  flutter:
    sdk: flutter
  flutter_localization: ^0.2.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/positions/
    - assets/payment/
    - assets/map_style/
    - assets/lottie/
    - assets/html/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600

