name: plagit
description: "Plagit — Premium Hospitality Recruitment"
publish_to: 'none'
version: 1.0.0+14

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^15.1.0

  # HTTP & API
  http: ^1.3.0

  # State management
  provider: ^6.1.0

  # Fonts
  google_fonts: ^6.1.0

  # Icons (iOS-like Phosphor icons)
  phosphor_flutter: ^2.1.0

  # Secure storage (JWT tokens)
  flutter_secure_storage: '>=9.2.0 <10.0.0'

  # Location / Maps (add back when implementing map features)
  # geolocator: ^13.0.0
  # google_maps_flutter: ^2.12.0

  # Image handling (add back when implementing profile/feed)
  # cached_network_image: ^3.4.0
  # image_picker: ^1.1.0

  # Localization / i18n
  flutter_localizations:
    sdk: flutter

  # Utilities
  intl: ^0.20.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0

  # Native share sheet (iOS UIActivityViewController / Android Intent)
  share_plus: ^10.1.0

  # In-app purchases — StoreKit (iOS) / Google Play Billing (Android)
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/branding/
    - assets/business/
